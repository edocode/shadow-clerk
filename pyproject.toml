[project]
name = "shadow-clerk"
version = "0.1.0"
description = "Web会議の音声をリアルタイムで録音・文字起こしするツール"
requires-python = ">=3.11"
dependencies = [
    "faster-whisper>=1.0.0",
    "sounddevice>=0.4.6",
    "webrtcvad-wheels>=2.0.11",
    "numpy>=1.24.0",
]

[project.scripts]
shadow-clerk-record = "recorder:main"
